   <style>
      .te-md-container{

      }
      .tistory-thumbnail,.blog-pic{

         background-position:center;

         margin: 0 auto;

      .hide{
         display:none !important;
      }

         cursor: pointer !important;

      }

      .blog-selection span{
         display:inline-block;
         width:186px;
          line-height: 37px;
          overflow: hidden;
          max-height: 37px;
          text-overflow: ellipsis;
          white-space:nowrap;
          font-size:13px;
      }
      li.list-group-item .blog-pic{

      }
      .popover{
          max-width: 100%; /* Max Width of the popover (depending on the container!) */
          max-height:400px;
          overflow-y:auto;
      
      }
      @media (min-width: 768px) {
         .popover{
            max-height:90vh;
         }
      }
      
      
      .regist-zone{
         text-align:center;
      }
      @media (min-width: 768px) {
         .regist-zone{
           
            text-align:right;
            margin-right:10px;
         }
      }
      
      .popover-body{
         padding:0;
      }
      .profile-popover-content h5{
         font-size: 12px;
         font-weight:600;
         color:#909090;
         margin-left:1rem;
      }
      .profile-popover-content>div{

      .profile-popover-content a{

    line-height: 24px;

     <header class="bmd-layout-header">

       <header>

       <ul class="list-group">

      <main class="bmd-layout-content">
         <div class="row">

            </div>

            <div class="col-1"  >
            </div>

               <button type="button" style="margin-right:10px" class="btn btn-raised btn-secondary">취소</button>
               <button type="button" class="btn btn-raised btn-primary write-button">등록</button>

            </div>

   <iframe style="visibility:hidden" width="0" height="0" class="external-logout-bridge" src="about:blank"></iframe>
<script>

var device = $.ua.device;


$('.profile-popover').popover({
    //container: $('.popover-station'),
    content:$('.profile-popover-content'),
    html:true,
    placement:'bottom',
    trigger:'click'
});

$(document).on('load','.external-logout-bridge',function(){
     // CORS Problem Fix
     if(url.indexOf('tistory.com/oauth/authorize')){
         // Logout Complete
         localStorage.removeItem('access-token');
         location.reload();
     }else {
         $('.logout-button').click();
     }
});


var info = {};

var access_token = localStorage.getItem('access-token');
axios.get('https://www.tistory.com/apis/blog/info?access_token='+access_token+'&output=json')
.then(function(response){
   var tistory = response.data.tistory;
   
   var selectedSeq = localStorage.getItem('selected-seq');
   
   if(tistory.status != 200){
      throw new Error(tistory);
   }
   
   
   info = tistory.item;
   
   $('.tistory-id').text(info.id);
   
   for(var i in info.blogs){
      var blog = info.blogs[i];
      var $blog = $('<li class="list-group-item godhand blog-selection"><div class="blog-pic"></div><span></span></li>');
      $blog.find('span').text(blog.title);
      $blog.find('.blog-pic').css('background-image','url('+blog.profileThumbnailImageUrl+')');
      $blog.attr('data-seq',i);
      $blog.attr('data-pic',blog.profileThumbnailImageUrl);
      
      if(selectedSeq == i){
         $blog.addClass('active');
      }
      
      switch(blog.role){
         case '소유자':
            $('.owner-blog').append($blog);
         break;
         case '관리자':
         case '편집자':
         case '필자':
            $('.member-blog').append($blog);
         break;
      }
      
   }
   var encodedProUrl = encodeURIComponent('https://tistory1.daumcdn.net/tistory/user/'+info.userId+'/profile/profileImg');
   
   var iconUrl = 'http://img1.daumcdn.net/thumb/C40x40/?fname=' + encodedProUrl;
   
   
   
   
   if(!selectedSeq){
      $('.blog-selection').eq(0).trigger('click');
   }else{
      $('.blog-selection[data-seq="'+selectedSeq+'"]').trigger('click');
   }
  
})
.catch(function(error){

   console.error(error);

   try{
   console.log(error.response.data.tistory);
      if(error.response.data.tistory.error_message.indexOf('access_token')>-1){
         location.href='https://www.tistory.com/oauth/authorize?  client_id=7e0e47fd077ca7057cfe47722f0c00dd&redirect_uri=http://ahryne.github.io/tistory-markdown/redirect.html&response_type=token';
         //location.href='https://www.tistory.com/oauth/authorize?  client_id=85755b376fdea37e204989b110a6b622&redirect_uri=http://localhost:10001/redirect.html&response_type=token';
      }else{
         throw error;
      }
   }catch(e){
      alert('오류가 발생하여 페이지를 다시 불러옵니다.');
      console.error(e);
      location.reload();
   }
});

var editor = new tui.Editor({
    el: document.querySelector('#editSection'),
    initialEditType: 'markdown',
    previewStyle: device.type == 'mobile' ? 'tab' : 'vertical',
    height: 'auto',
    usageStatistics: false,
});
/*
var viewer = new tui.Viewer({
    el: document.querySelector('#viewerSection'),
    height: '100%',
    initialValue: '# content to be rendered'
});
*/

$(document).on('click','.logout-button',function(){
      $('.ajax-loading').removeClass('hide');
      $('.external-logout-bridge').attr('src','https://tistory.com/auth/logout');
      
      // CORS Problem Fix
      setTimeout(function(){
         location.href='https://www.tistory.com/oauth/authorize?  client_id=7e0e47fd077ca7057cfe47722f0c00dd&redirect_uri=http://ahryne.github.io/tistory-markdown/redirect.html&response_type=token';
      },1000);
});


$(document).on('click','.blog-selection',function(){
   $('.blog-selection').removeClass('active');
   $(this).addClass('active');
   
   localStorage.setItem('selected-seq',$(this).attr('data-seq'));
   
   $('.navbar-brand').text($(this).find('span').text());
   
   $('.tistory-thumbnail').css('background-image','url('+$(this).attr('data-pic')+')');

});

$(document).on('click','.write-button',function(){

   if(confirm('글을 등록하시겠습니까?')){
      var formData = new FormData();
      
      
      var contentHtml = (editor.getHtml());
      var contentMarkdown = (editor.getMarkdown());
      
      var $hide = $('<span>');
      $hide.append($('<div style="display:none">'));
      $('div',$hide).append(contentMarkdown);
      

      var mixedHtml = contentHtml + $hide.html();
      // '\r\n\r\n<!--\r\n' + contentMarkdown + '\r\n-->\r\n'
      
      var selectedSeq = Number(localStorage.getItem('selected-seq'));
      
      
      formData.append('access_token',access_token);
      formData.append('output','json');
      formData.append('blogName',info.blogs[selectedSeq].name);
      formData.append('title',$('.input-title').val());
      formData.append('content',mixedHtml);
      formData.append('visibility',0);
      formData.append('category',0);
      formData.append('acceptComment',0);
   
      axios({
         method:'post',
         url:'https://www.tistory.com/apis/post/write',
         data:formData,
         config:{headers:{'Content-Type':'multipart/form-data'}}
      })
      .then(function(response){
         alert(JSON.stringify(response.data));
      })
      .catch(function(error){
         alert("글을 등록할 수 없습니다.");
         console.error(error);
      });
   
   }
});



      // fix code mirror bug
      $('.tui-editor-defaultUI .CodeMirror-scroll').css('min-height','300px');

</script>
</body>
